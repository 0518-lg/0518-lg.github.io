<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目发布顺序抽签（含负责人）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            max-width: 700px;
            margin: 0 auto;
            padding: 15px;
            background: #f7f8fa;
        }
        .title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
        }
        .tip {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .project-list {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .project-item:last-child {
            border-bottom: none;
        }
        .project-info {
            flex: 1;
        }
        .project-name {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }
        .leader {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }
        .draw-btn {
            padding: 6px 14px;
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .draw-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .order-num {
            margin-right: 10px;
            color: #ff4d4f;
            font-weight: bold;
            font-size: 15px;
            min-width: 40px;
            text-align: right;
        }
        .result-box {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
        }
        .result-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .result-item {
            font-size: 15px;
            line-height: 2;
            padding-left: 5px;
        }
        .reset-box {
            text-align: center;
            margin: 20px 0;
        }
        .reset-btn {
            padding: 10px 30px;
            background: #ff4d4f;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="title">32个项目发布顺序抽签（含负责人）</div>
    <div class="tip">负责人点击自己项目后的【抽签】按钮，自动分配发布顺位</div>

    <!-- 项目清单列表（含负责人） -->
    <div class="project-list" id="projectList"></div>

    <!-- 重置按钮 -->
    <div class="reset-box">
        <button class="reset-btn" id="resetBtn">重置所有抽签</button>
    </div>

    <!-- 最终顺序汇总 -->
    <div class="result-box">
        <div class="result-title">已抽签发布顺序（按1→32排序）</div>
        <div id="finalResult"></div>
    </div>

    <script>
        // ====================== 在这里替换成你的32个项目+负责人 ======================
        // 格式：{ name: "项目名", leader: "负责人姓名" }，共32个，不要漏写、多写
        const projects = [
            { name: "项目1创效·优醇·绿色——原料烟箱“无膜化”的实践应用", leader: "总部" },
            { name: "项目2直驱式料液输送装置的研制", leader: "武汉卷烟厂" },
            { name: "项目3提升烟叶一体化平台自动扫码成功率", leader: "武汉卷烟厂" },
            { name: "项目4降低制丝线除麻除块断流频次", leader: "武汉卷烟厂" },
            { name: "项目5封箱机智能型条烟二维码读码装置的研制", leader: "武汉卷烟厂" },
            { name: "项目6视窗卷烟接装纸自动换卷装置的研制", leader: "襄阳卷烟厂" },
            { name: "项目7除尘滤袋限位装置的研制", leader: "襄阳卷烟厂" },
            { name: "项目8加料工序糖料余料自动处理装置的研制", leader: "襄阳卷烟厂" },
            { name: "项目9 GIMA TT包装机自动补烟装置的研制", leader: "襄阳卷烟厂" },
            { name: "项目10提高圆压成型烟箱产品一次成型合格率", leader: "襄阳鸿琰" },
            { name: "项目11组合式空调表冷段节能供水装置的研制", leader: "恩施卷烟厂" },
            { name: "项目12制丝控制系统异常预警模块的研制", leader: "恩施卷烟厂" },
            { name: "项目13降低ZB416A硬盒包装机小盒包装质量缺陷率", leader: "恩施卷烟厂" },
            { name: "项目14一次分切轮铲刀组件免拆卸装置的研制", leader: "三峡卷烟厂" },
            { name: "项目15提高雪之梦9号小盒包装机效率", leader: "三峡卷烟厂" },
            { name: "项目16降低制丝湿团烟丝量", leader: "三峡卷烟厂" },
            { name: "项目17降低膨胀烟丝黄斑缺陷率", leader: "宜昌金丝/金叶" },
            { name: "项目18降低素包烟条包剔除率", leader: "红安卷烟厂" },
            { name: "项目19皮带运输机托辊快速拆装装置的研制", leader: "红安卷烟厂" },
            { name: "项目20软包质量检验多功能量具的研制", leader: "红安卷烟厂" },
            { name: "项目21书型盒成品组装机磁铁检测装置的研制", leader: "湖北龙乡" },
            { name: "项目22降低细支包装机内框纸成型故障停机频次", leader: "广水卷烟厂" },
            { name: "项目23多机一区域空调变风量系统的研制", leader: "广水卷烟厂" },
            { name: "项目24异型烟包装机空烟检测系统的研发与应用", leader: "广水卷烟厂" },
            { name: "项目25降低复合成型机组视窗滤棒相位质量缺陷率", leader: "卷烟材料厂" },
            { name: "项目26 ZL22 烟用滤棒成型机组冷却条除湿除尘装置的研制", leader: "卷烟材料厂" },
            { name: "项目27 烟用滤棒成型机组电热除胶铲刀的研制", leader: "卷烟材料厂" },
            { name: "项目28造纸法薄片烘干部水分智能控制系统的研制", leader: "新叶薄片" },
            { name: "项目29提高稠浆均质性", leader: "新叶薄片" },
            { name: "项目30提高WY4816产品得率", leader: "黄鹤楼科技园" },
            { name: "项目31提高黄鹤楼3mg产品产出率", leader: "黄鹤楼科技园" },
            { name: "项目32降低爆珠湿丸干燥时长", leader: "黄鹤楼科技园" }
        ];
        // ============================================================================

        // 抽签逻辑（不变，无需修改）
        let usedNumbers = [];
        let resultMap = {};
        const total = projects.length;

        // 渲染项目清单（新增负责人显示）
        function renderProjects() {
            const listEl = document.getElementById('projectList');
            listEl.innerHTML = '';
            projects.forEach((item, index) => {
                const projectItem = document.createElement('div');
                projectItem.className = 'project-item';
                projectItem.innerHTML = `
                    <div class="project-info">
                        <div class="project-name">${item.name}</div>
                        <div class="leader">负责人：${item.leader}</div>
                    </div>
                    <span class="order-num" id="num-${index}"></span>
                    <button class="draw-btn" data-index="${index}" id="btn-${index}">抽签</button>
                `;
                listEl.appendChild(projectItem);
            });

            // 绑定点击事件
            document.querySelectorAll('.draw-btn').forEach(btn => {
                btn.addEventListener('click', drawOrder);
            });
        }

        // 抽取顺位（不变，无需修改）
        function drawOrder(e) {
            const index = e.target.dataset.index;
            const projectItem = projects[index];
            const projectName = projectItem.name;

            if (resultMap[projectName]) {
                alert('该项目已完成抽签！');
                return;
            }

            // 生成不重复随机数（1~32）
            let num;
            do {
                num = Math.floor(Math.random() * total) + 1;
            } while (usedNumbers.includes(num));

            usedNumbers.push(num);
            resultMap[projectName] = num;

            // 更新页面：显示顺位、禁用按钮
            document.getElementById(`num-${index}`).innerText = `第${num}顺位`;
            document.getElementById(`btn-${index}`).disabled = true;
            renderResult();
        }

        // 渲染最终排序（不变，无需修改）
        function renderResult() {
            const resultEl = document.getElementById('finalResult');
            resultEl.innerHTML = '';

            // 按顺位从小到大排序
            const sorted = Object.entries(resultMap).sort((a, b) => a[1] - b[1]);

            sorted.forEach(([name, num]) => {
                // 匹配对应负责人，显示在结果中
                const leader = projects.find(item => item.name === name).leader;
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerText = `第${num}顺位：${name}（负责人：${leader}）`;
                resultEl.appendChild(div);
            });
        }

        // 重置功能（不变，无需修改）
        document.getElementById('resetBtn').addEventListener('click', () => {
            usedNumbers = [];
            resultMap = {};
            renderProjects();
            renderResult();
            alert('已重置所有抽签结果');
        });

        // 初始化页面
        renderProjects();
    </script>
</body>
</html>
